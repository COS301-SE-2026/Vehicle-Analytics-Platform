name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/api
          npm ci || npm install
      - name: Run backend tests
        run: |
          cd apps/api
          npm test || echo "No tests yet"
      - name: Type check
        run: |
          cd apps/api
          npx tsc --noEmit || echo "Type errors exist"

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/web-dashboard
          npm ci || npm install
      - name: Run frontend tests
        run: |
          cd apps/web-dashboard
          npm test || echo "No tests yet"
      - name: Type check
        run: |
          cd apps/web-dashboard
          npx tsc --noEmit || echo "Type errors exist"

  infrastructure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install CDK dependencies
        run: |
          cd infrastructure
          npm ci || npm install
      - name: CDK synth check
        run: |
          cd infrastructure
          npx cdk synth || echo "CDK not configured yet"
