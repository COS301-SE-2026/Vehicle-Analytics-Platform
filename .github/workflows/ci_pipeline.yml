name: CI Pipeline

on:
  workflow_dispatch:  # manual trigger only for now
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  backend_tests:
    if: false  # Disable backend tests during setup
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npx jest --covarage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend

  frontend_tests:
    if: false  # Disable frontend tests during setup
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npx jest --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend

  database_tests:
    if: false  # Disable database tests during setup
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_DB: fleet_analytics_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./database
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache-dependency-path: ./database/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migration tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: fleet_analytics_test
          DB_USER: admin
          DB_PASSWORD: testpassword
