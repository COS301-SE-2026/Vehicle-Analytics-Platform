name: CI Pipeline

on:
  #workflow_dispatch:  # manual trigger only for now
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend_tests:
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npx jest --coverage --coverageDirectory=coverage

      - name: Show generated coverage files
        run: |
          echo 'Coverage directory listing:'
          ls -la coverage || true
          echo '\nFirst 40 lines of lcov.info (if present):'
          if [ -f coverage/lcov.info ]; then sed -n '1,40p' coverage/lcov.info; else echo 'lcov.info not found'; fi
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          directory: ./backend/coverage
          fail_ci_if_error: false

  frontend_tests:
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npx jest --coverage --coverageDirectory=coverage

      - name: Show generated coverage files
        run: |
          echo 'Coverage directory listing:'
          ls -la coverage || true
          echo '\nFirst 40 lines of lcov.info (if present):'
          if [ -f coverage/lcov.info ]; then sed -n '1,40p' coverage/lcov.info; else echo 'lcov.info not found'; fi
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          directory: ./frontend/coverage
          fail_ci_if_error: false

  database_tests:
    runs-on: ubuntu-latest
    continue-on-error: false
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: fleet_analytics_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./database
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./database/package-lock.json

      - name: Install dependencies
        run: npm ci

      # We must explicitly run the sql migrations because GitHub Services 
      - name: Run Database Migrations
        run: |
          sudo apt-get install postgresql-client -y
          for file in $(ls migrations/*.sql | sort -V); do
            echo "Running migration: $file"
            PGPASSWORD=testpassword psql -h localhost -U admin -d fleet_analytics_test -f "$file"
          done
        
      - name: Run migration tests (with coverage)
        run: npx jest --coverage --coverageDirectory=coverage --runInBand
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: fleet_analytics_test
          DB_USER: admin
          DB_PASSWORD: testpassword

      - name: Show generated coverage files
        run: |
          echo 'Coverage directory listing:'
          ls -la coverage || true
          echo '\nFirst 40 lines of lcov.info (if present):'
          if [ -f coverage/lcov.info ]; then sed -n '1,40p' coverage/lcov.info; else echo 'lcov.info not found'; fi
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: database
          directory: ./database/coverage
          fail_ci_if_error: false
