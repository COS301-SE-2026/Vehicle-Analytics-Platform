version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: vehicle-analytics-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vehicle_analytics
    ports:
      - "5432:5432"

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: vehicle-analytics-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vehicle_analytics
    ports:
      - "5433:5432"
