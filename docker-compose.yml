services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: fleet_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fleet_analytics
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    volumes:
      - ./database/migrations:/docker-entrypoint-initdb.d
      - fleet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fleet_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: fleet_backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=fleet_analytics
      - DB_USER=admin
      - DB_PASSWORD=${DB_PASSWORD:-localdev}
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: fleet_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  fleet_db_data: