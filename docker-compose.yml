version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: fleet_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fleet_analytics
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: localdev
    volumes:
      - ./database/migrations:/docker-entrypoint-initdb.d
      - fleet_db_data:/var/lib/postgresql/data

volumes:
  fleet_db_data: